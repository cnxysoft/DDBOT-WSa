name: "CI"
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  # run unittest
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_TOOL_CACHE: /toolcache
    strategy:
      fail-fast: false
      matrix:
        go: [ '1.23.4' ]

    steps:
      - uses: actions/checkout@v3
      - name: Setup FFMPEG static library for tests
        run: |
          mkdir -p ffmpeg/ffmpeg-static
          cd ffmpeg/ffmpeg-static
          PLATFORM_FILE="ffmpeg-linux-amd64.zip"
          curl -L -o "$PLATFORM_FILE" "https://github.com/cnxysoft/ffmpeg-static/releases/latest/download/$PLATFORM_FILE"
          unzip -o "$PLATFORM_FILE" -d .
          ls -la
      - name: Setup Go environment
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go }}
      - name: Run tests with cgo
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: "-I${{ github.workspace }}/ffmpeg/ffmpeg-static/include"
          CGO_LDFLAGS: "-L${{ github.workspace }}/ffmpeg/ffmpeg-static/lib"
        run: |
          go test -v -coverprofile=profile.cov ./...
      - name: go vet
        run: |
          go vet ./...
      - name: Generate HTML report
        run: go tool cover -html=profile.cov -o coverage.html
      - name: Upload as coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html

  # build binary
  build:
    needs: test
    name: Build binary CI
    env:
      RUNNER_TOOL_CACHE: /toolcache
    strategy:
      matrix:
        include:
          # Linux amd64
          - go: '1.23.4'
            goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - go: '1.23.4'
            goos: linux
            goarch: 386
            runner: ubuntu-latest
          - go: '1.23.4'
            goos: linux
            goarch: arm
            runner: ubuntu-latest
          - go: '1.23.4'
            goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - go: '1.23.4'
            goos: windows
            goarch: 386
            runner: ubuntu-latest
          - go: '1.23.4'
            goos: windows
            goarch: amd64
            runner: ubuntu-latest
          - go: '1.23.4'
            goos: windows
            goarch: arm
            runner: ubuntu-latest
          - go: '1.23.4'
            goos: windows
            goarch: arm64
            runner: ubuntu-latest
          - go: '1.23.4'
            goos: darwin
            goarch: amd64
            runner: macos-latest
          - go: '1.23.4'
            goos: darwin
            goarch: arm64
            runner: macos-latest
      fail-fast: true
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup FFMPEG static library for current platform
        run: |
          # 创建ffmpeg-static和static目录
          mkdir -p ffmpeg/ffmpeg-static
          cd ffmpeg/ffmpeg-static
          
          # 根据当前平台确定要下载的静态库文件名
          export PLATFORM_FILE="ffmpeg-${{ matrix.goos }}-${{ matrix.goarch }}.zip"
          
          echo "Downloading $PLATFORM_FILE for ${{ matrix.goos }}/${{ matrix.goarch }}..."
          curl -L -o "$PLATFORM_FILE" "https://github.com/cnxysoft/ffmpeg-static/releases/latest/download/$PLATFORM_FILE"
          
          echo "Verifying $PLATFORM_FILE..."
          if [ -f "$PLATFORM_FILE" ]; then
            echo "Successfully downloaded $PLATFORM_FILE"
            
            echo "Extracting $PLATFORM_FILE to ffmpeg/static directory..."
            unzip -o "$PLATFORM_FILE" -d .
            
            echo "Verifying extraction..."
            if [ -d "../ffmpeg-static" ]; then
              echo "Successfully extracted to ffmpeg/static directory"
              echo "Contents of ffmpeg/static directory:"
              ls -la
            else
              echo "Failed to extract to ffmpeg/static directory"
              exit 1
            fi
          else
            echo "Failed to download $PLATFORM_FILE"
            exit 1
          fi
      
      - name: Setup LLVM-mingw toolchain
        if: matrix.goos == 'windows'
        run: |
          mkdir -p /tmp/llvm-mingw
          cd /tmp/llvm-mingw
          curl -L -o llvm-mingw.tar.xz "https://github.com/mstorsjo/llvm-mingw/releases/download/20240820/llvm-mingw-20240820-ucrt-ubuntu-20.04-x86_64.tar.xz"
          tar -xf llvm-mingw.tar.xz
          export LLVM_MINGW_PATH=$(find /tmp/llvm-mingw -type d -name "llvm-mingw-*" -maxdepth 1)
          echo "$LLVM_MINGW_PATH/bin" >> $GITHUB_PATH
          echo "LLVM_MINGW_PATH=$LLVM_MINGW_PATH" >> $GITHUB_ENV

      - name: Install cross toolchains for Linux targets
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          case "${{ matrix.goarch }}" in
            386)
              sudo apt-get install -y gcc-multilib g++-multilib
              ;;
            arm)
              sudo apt-get install -y gcc-arm-linux-gnueabihf
              ;;
            arm64)
              sudo apt-get install -y gcc-aarch64-linux-gnu
              ;;
          esac

      - name: Setup Go environment
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: "**/*.sum"
      
      - name: Set env
        run: |
          echo BUILD_TIME=$(date --rfc-3339=seconds) >> ${GITHUB_ENV}
          echo Tags=github >> ${GITHUB_ENV}
      
      - name: Build CLI version (no cgo)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          export BINARY_NAME="DDBOT"
          if [ "$GOOS" = "windows" ]; then export BINARY_NAME="$BINARY_NAME-cli.exe"; else export BINARY_NAME="$BINARY_NAME-cli"; fi
          echo "Building CLI version: $BINARY_NAME for $GOOS/$GOARCH"
          go build -v -trimpath -o "$BINARY_NAME" -ldflags="-s -w -X 'github.com/cnxysoft/DDBOT-WSa/lsp.BuildTime=${{ env.BUILD_TIME }}' -X 'github.com/cnxysoft/DDBOT-WSa/lsp.CommitId=${{ github.sha }}' -X 'github.com/cnxysoft/DDBOT-WSa/lsp.Tags=${{ env.Tags }}'" github.com/cnxysoft/DDBOT-WSa/cmd
      
      - name: Build CGO version
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          export BINARY_NAME="DDBOT"
          if [ "$GOOS" = "windows" ]; then export BINARY_NAME="$BINARY_NAME-cgo.exe"; else export BINARY_NAME="$BINARY_NAME-cgo"; fi
          echo "Building CGO version: $BINARY_NAME for $GOOS/$GOARCH"
          
          # 为Windows设置交叉编译环境
          if [ "$GOOS" = "windows" ]; then
            if [ "$GOARCH" = "amd64" ]; then
              export CC="x86_64-w64-mingw32-gcc"
              export CXX="x86_64-w64-mingw32-g++"
            elif [ "$GOARCH" = "386" ]; then
              export CC="i686-w64-mingw32-gcc"
              export CXX="i686-w64-mingw32-g++"
            elif [ "$GOARCH" = "arm64" ]; then
              export CC="aarch64-w64-mingw32-gcc"
              export CXX="aarch64-w64-mingw32-g++"
            elif [ "$GOARCH" = "arm" ]; then
              export CC="armv7-w64-mingw32-gcc"
              export CXX="armv7-w64-mingw32-g++"
            fi
          fi
          
          # 为Linux设置交叉编译环境
          if [ "$GOOS" = "linux" ]; then
            if [ "$GOARCH" = "386" ]; then
              export CC="gcc -m32"
            elif [ "$GOARCH" = "arm" ]; then
              export CC="arm-linux-gnueabihf-gcc"
            elif [ "$GOARCH" = "arm64" ]; then
              export CC="aarch64-linux-gnu-gcc"
            fi
          fi

          go build -v -trimpath -tags cgo -o "$BINARY_NAME" -ldflags="-s -w -extldflags=-static -linkmode external -extldflags '-Wl,--gc-sections' -X 'github.com/cnxysoft/DDBOT-WSa/lsp.BuildTime=${{ env.BUILD_TIME }}' -X 'github.com/cnxysoft/DDBOT-WSa/lsp.CommitId=${{ github.sha }}' -X 'github.com/cnxysoft/DDBOT-WSa/lsp.Tags=${{ env.Tags }}'" github.com/cnxysoft/DDBOT-WSa/cmd
      
      - name: List build artifacts
        run: ls -la
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            ./DDBOT-cli*
            ./DDBOT-cgo*
