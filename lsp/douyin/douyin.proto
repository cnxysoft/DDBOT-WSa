syntax = "proto3";
package douyin;

option go_package = "lsp/douyin";

 // 精简后的UserPostsResponse定义，只保留推送和可视化所需的关键字段
message UserPostsResponse {
  // 作者信息
  message Author {
    string uid = 1;
    string nickname = 3;
    AvatarThumb avatar_thumb = 6;
    string sec_uid = 53;
  }

  // 头像信息
  message AvatarThumb {
    string uri = 1;
    repeated string url_list = 2;
    int32 width = 3;
    int32 height = 4;
  }

  // 音乐信息
  message Music {
    int64 id = 1;
    string id_str = 2;
    string title = 3;
    string author = 4;
    string album = 5;
    CoverThumb cover_thumb = 9;
    PlayUrl play_url = 10;
    int32 duration = 15;
    string owner_nickname = 23;
    bool is_original = 24;
  }

  // 封面信息
  message CoverThumb {
    string uri = 1;
    repeated string url_list = 2;
    int32 width = 3;
    int32 height = 4;
  }

  // 播放地址信息
  message PlayUrl {
    string uri = 1;
    repeated string url_list = 2;
    int32 width = 3;
    int32 height = 4;
    string url_key = 5;
  }

  // 视频信息
  message Video {
    PlayAddr play_addr = 1;
    Cover cover = 2;
    int32 height = 3;
    int32 width = 4;
    DynamicCover dynamic_cover = 5;
    OriginCover origin_cover = 6;
    string ratio = 7;
    int32 duration = 12;
  }

  // 播放地址
  message PlayAddr {
    string uri = 1;
    repeated string url_list = 2;
    int32 width = 3;
    int32 height = 4;
    string url_key = 5;
    int32 data_size = 6;
    string file_hash = 7;
  }

  // 封面
  message Cover {
    string uri = 1;
    repeated string url_list = 2;
    int32 width = 3;
    int32 height = 4;
  }

  // 动态封面
  message DynamicCover {
    string uri = 1;
    repeated string url_list = 2;
    int32 width = 3;
    int32 height = 4;
  }

  // 原始封面
  message OriginCover {
    string uri = 1;
    repeated string url_list = 2;
    int32 width = 3;
    int32 height = 4;
  }

  // 统计信息
  message Statistics {
    int32 comment_count = 2;
    int32 digg_count = 3;
    int32 play_count = 5;
    int32 share_count = 6;
    int32 collect_count = 7;
  }

  // 状态信息
  message Status {
    bool is_delete = 2;
    bool allow_share = 3;
    ReviewResult review_result = 4;
    bool in_reviewing = 9;
  }

  // 审核结果
  message ReviewResult {
    int32 review_status = 1;
  }

  // 视频作品条目
  message AwemeList {
    string aweme_id = 1;
    string desc = 2;
    int32 create_time = 3;
    Author author = 4;
    Music music = 5;
    Video video = 7;
    string share_url = 8;
    Statistics statistics = 10;
    Status status = 11;
    bool is_ads = 20;
    int32 duration = 21;
    int32 aweme_type = 22;
  }

  message LogPb {
    string impr_id = 1;
  }

  int32 status_code = 1;
  int64 min_cursor = 2;
  int64 max_cursor = 3;
  int32 has_more = 4;
  repeated AwemeList aweme_list = 5;
  LogPb log_pb = 7;
}
